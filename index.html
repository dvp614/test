<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 안의 숨겨진 성격 찾기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 1. Intro Screen -->
        <section id="intro-screen" class="screen active">
            <div class="card glass">
                <div class="badge">Character Quiz</div>
                <h1>내 안의 숨겨진 <br><span>성격 유형</span> 찾기</h1>
                <p>몇 가지 질문을 통해 당신이 어떤 사람인지 알아보세요!</p>
                <div class="hero-image">🎨</div>
                <button id="start-btn" class="primary-btn">테스트 시작하기</button>
            </div>
        </section>

        <!-- 2. Quiz Screen -->
        <section id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <span id="question-number">1 / 5</span>
            </div>
            <div class="card quiz-card">
                <h2 id="question-text">질문 내용이 여기에 들어갑니다.</h2>
                <div id="options-container" class="options-grid">
                    <!-- Options will be generated by JS -->
                </div>
            </div>
        </section>

        <!-- 3. Result Screen -->
        <section id="result-screen" class="screen">
            <div class="card result-card">
                <div class="badge success">결과 확인</div>
                <h2 id="result-title">당신은 '창의적인 예술가' 타입!</h2>
                <div id="result-emoji" class="result-emoji">✨</div>
                <p id="result-desc">당신은 독창적인 아이디어와 예술적 감각이 뛰어난 사람입니다.</p>
                
                <div class="result-actions">
                    <button id="restart-btn" class="secondary-btn">다시 하기</button>
                    <button id="share-btn" class="primary-btn">결과 공유하기</button>
                </div>
            </div>
        </section>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
